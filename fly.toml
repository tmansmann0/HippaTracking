app = "hipaa-tracking"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  PRIVACY_MODE = "strict"
  RELAY_SITE_ID = "default"
  SENSITIVE_PATH_PATTERNS = "botox,filler,laser,body-contouring,coolsculpting,semaglutide,glp-1,weight-loss,hormone,iv-therapy,consultation"
  ALLOWED_CUSTOM_DATA_KEYS = "value,currency"
  META_ENABLED = "false"
  META_GRAPH_VERSION = "v21.0"
  GA4_ENABLED = "false"
  GA4_ENDPOINT_REGION = "global"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  timeout = "2s"
  path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

